services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
